# joint_limits.yaml allows the dynamics properties specified in the URDF to be overwritten or augmented as needed

# Global velocity/acceleration scaling — applied when planner doesn't specify its own.
# Set low (0.025) so ALL motion phases default to safe, slow speed.
default_velocity_scaling_factor: 0.025
default_acceleration_scaling_factor: 0.025

# Specific joint properties can be changed with the keys [max_position, min_position, max_velocity, max_acceleration]
# Joint limits can be turned off with [has_velocity_limits, has_acceleration_limits]
joint_limits:
  gripper_left_joint:
    has_velocity_limits: true
    max_velocity: 5.0
    has_acceleration_limits: true
    max_acceleration: 5.0
  joint5_roll:
    has_position_limits: true
    min_position: -3.141592654   # -180°
    max_position:  3.141592654   # +180°
    has_velocity_limits: true
    max_velocity: 1.5
    has_acceleration_limits: true
    max_acceleration: 1.5
  gripper_right_joint:
    has_velocity_limits: true
    max_velocity: 5.0
    has_acceleration_limits: true
    max_acceleration: 5.0
  joint1:
    has_velocity_limits: true
    max_velocity: 1.5
    has_acceleration_limits: true
    max_acceleration: 1.5
  joint2:
    has_velocity_limits: true
    max_velocity: 1.5
    has_acceleration_limits: true
    max_acceleration: 1.5
  joint3:
    has_velocity_limits: true
    max_velocity: 1.5
    has_acceleration_limits: true
    max_acceleration: 1.5
  joint4:
    has_velocity_limits: true
    max_velocity: 1.5
    has_acceleration_limits: true
    max_acceleration: 1.5
